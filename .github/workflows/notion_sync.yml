name: CME to Notion Sync

on:
  schedule:
    # 建议维持在 UTC 10:00 (北京时间 18:00)，确保 CME 官方数据已经更新到 GitHub
    - cron: '0 10 * * *'
  workflow_dispatch: # 允许手动点击运行

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4  # 升级到 v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 升级到 v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 关键：确保安装最新版 notion-client 和支持 xls 的 xlrd
          pip install --upgrade requests xlrd==2.0.1 notion-client

      - name: Run Sync Script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python sync_cme_to_notion.py
